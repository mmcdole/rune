name: website

# Deploys on every main push and on release tags, so cutting a release
# always ships the current docs site. No paths filter: GitHub skips
# path-filtered workflows on tag pushes.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: website-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Build site
        working-directory: website
        run: |
          npm ci
          npm run build
      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
