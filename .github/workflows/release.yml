name: release

on:
  push:
    tags: ["v*"]

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # rune-jit is cgo + statically linked LuaJIT, so it cannot be
  # cross-compiled from one runner; each target builds natively and
  # attaches its archive to the release goreleaser created above.
  rune-jit:
    needs: goreleaser
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: darwin_arm64
          - os: ubuntu-24.04
            target: linux_amd64
          - os: ubuntu-24.04-arm
            target: linux_arm64
          - os: windows-2025
            target: windows_amd64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install LuaJIT (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y luajit libluajit-5.1-dev
      - name: Install LuaJIT (macOS)
        if: runner.os == 'macOS'
        run: brew install luajit
      - name: Build static LuaJIT (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-luajit-windows
      - name: Test this platform's JIT build
        shell: bash
        run: go test -tags luajit ./lua/ ./script/...
      - name: Build rune-jit
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BIN="rune-jit"
          [ "$RUNNER_OS" = "Windows" ] && BIN="rune-jit.exe"
          go build -tags luajit -trimpath \
            -ldflags "-s -w -X github.com/mmcdole/rune/version.Number=${VERSION}" \
            -o "$BIN" ./cmd/rune
      - name: Verify binary is self-contained
        shell: bash
        run: |
          case "$RUNNER_OS" in
            macOS)   check() { otool -L rune-jit; } ;;
            Linux)   check() { ldd rune-jit; } ;;
            Windows) check() { objdump -p rune-jit.exe | grep -i 'DLL Name' || true; } ;;
          esac
          if check | grep -qi luajit; then
            echo "rune-jit dynamically links LuaJIT; release binaries must be static" >&2
            exit 1
          fi
      - name: Package and attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="rune-jit_${VERSION}_${{ matrix.target }}"
          mkdir "$NAME"
          cp LICENSE README.md "$NAME/"
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp rune-jit.exe "$NAME/"
            7z a "$NAME.zip" "$NAME" > /dev/null
            sha256sum "$NAME.zip" > "$NAME.zip.sha256"
            gh release upload "$GITHUB_REF_NAME" "$NAME.zip" "$NAME.zip.sha256"
          else
            cp rune-jit "$NAME/"
            tar -czf "$NAME.tar.gz" "$NAME"
            shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
            gh release upload "$GITHUB_REF_NAME" "$NAME.tar.gz" "$NAME.tar.gz.sha256"
          fi
