version: 2

project_name: rune

builds:
  - main: ./cmd/rune
    binary: rune
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/mmcdole/rune/version.Number={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  # v1.2.3-beta.1 style tags publish as prereleases automatically.
  prerelease: auto

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '(?i)^merge '
